<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eBay Profit Calculator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>eBay Profit Calculator</h1>
      <p class="subtitle">Calculate your true net profit</p>
    </header>

    <div class="form-group">
      <label for="salePrice">Sale Price ($)</label>
      <input type="number" id="salePrice" placeholder="0.00" step="0.01" min="0">
    </div>

    <div class="form-group">
      <label for="itemCost">Item Cost ($)</label>
      <input type="number" id="itemCost" placeholder="0.00" step="0.01" min="0">
    </div>

    <div class="form-group">
      <label for="shippingCost">Shipping Cost ($)</label>
      <input type="number" id="shippingCost" placeholder="0.00" step="0.01" min="0">
    </div>

    <div class="form-group">
      <label for="ebayCategory">eBay Category</label>
      <select id="ebayCategory">
        <option value="0.1325">Most Categories (13.25%)</option>
        <option value="0.15">Clothing &amp; Accessories (15%)</option>
        <option value="0.0915">Heavy Equipment (9.15%)</option>
        <option value="0.0865">Musical Instruments (8.65%)</option>
        <option value="0.065">Select Collectibles (6.5%)</option>
        <option value="custom">Custom Fee %</option>
      </select>
    </div>

    <div class="form-group" id="customFeeGroup" style="display:none;">
      <label for="customFee">Custom eBay Fee (%)</label>
      <input type="number" id="customFee" placeholder="0.00" step="0.01" min="0" max="100">
    </div>

    <div class="form-group">
      <label for="paymentFee">Payment Processing</label>
      <select id="paymentFee">
        <option value="0.03">Standard (3%)</option>
        <option value="0">None</option>
        <option value="custom">Custom %</option>
      </select>
    </div>

    <div class="form-group">
      <label for="taxRate">Sales Tax Rate (%)</label>
      <input type="number" id="taxRate" placeholder="0.00" step="0.01" min="0" max="20">
    </div>

    <button id="calculateBtn" class="btn-primary">Calculate Profit</button>

    <div class="results" id="results" style="display:none;">
      <h2>Results</h2>
      <div class="result-row">
        <span>Sale Price</span>
        <span id="res-salePrice" class="value"></span>
      </div>
      <div class="result-row">
        <span>eBay Fee</span>
        <span id="res-ebayFee" class="value negative"></span>
      </div>
      <div class="result-row">
        <span>Payment Fee</span>
        <span id="res-paymentFee" class="value negative"></span>
      </div>
      <div class="result-row">
        <span>Shipping Cost</span>
        <span id="res-shipping" class="value negative"></span>
      </div>
      <div class="result-row">
        <span>Item Cost</span>
        <span id="res-itemCost" class="value negative"></span>
      </div>
      <div class="result-row total">
        <span>Net Profit</span>
        <span id="res-netProfit" class="value"></span>
      </div>
      <div class="result-row">
        <span>ROI</span>
        <span id="res-roi" class="value"></span>
      </div>
      <div class="result-row">
        <span>Profit Margin</span>
        <span id="res-margin" class="value"></span>
      </div>
    </div>

    <div class="settings-row">
      <button id="settingsBtn" class="btn-secondary">Settings</button>
      <button id="clearBtn" class="btn-secondary">Clear</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
